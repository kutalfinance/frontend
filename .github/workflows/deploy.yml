name: Deploy

on:
  push:
    branches: [staging, main]

env:
  TF_VERSION: "1.10.5"

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_CLI: false
      TF_VARS_FILE: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}.tfvars
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init, Plan, Apply
        working-directory: terraform
        run: |
          WORKSPACE=${{ github.ref_name == 'main' && 'prod' || 'dev' }}
          terraform init
          terraform workspace select $WORKSPACE 2>/dev/null || terraform workspace new $WORKSPACE
          terraform plan \
            -var-file=$TF_VARS_FILE \
            -out=tfplan
          terraform apply -auto-approve tfplan

  deploy:
    name: Deploy to SWA
    runs-on: ubuntu-latest
    needs: terraform
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install
      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: build/client
          skip_app_build: true
          deployment_environment: ${{ github.ref_name == 'main' && '' || 'staging' }}
