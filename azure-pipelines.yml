trigger:
  branches:
    include:
      - dev
      - staging
      - main

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: SecretScan
    displayName: "Secret Scan"
    condition: eq(variables['Build.SourceBranchName'], 'dev')
    jobs:
      - job: SecretScan
        displayName: "Secret and Credential Scan"
        steps:
          - checkout: self
            fetchDepth: "0"
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.x"
            displayName: "Install Python"
          - script: |
              pip install truffleHog3
              trufflehog3 --format json --output truffleHog-report.json .
              if [ -s truffleHog-report.json ] && [ "$(cat truffleHog-report.json)" != "[]" ]; then
                echo "##[error]Secrets detected in repository!"
                cat truffleHog-report.json
                exit 1
              fi
            displayName: "Run TruffleHog Secret Scan"

  - stage: DeployProduction
    displayName: "Deploy to Production"
    condition: eq(variables['Build.SourceBranchName'], 'main')
    variables:
      - group: KssFrontendProd
    jobs:
      - job: BuildAndDeploy
        displayName: "Build and Deploy"
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: "22.x"
            displayName: "Install Node.js"
          - script: |
              corepack enable
              pnpm install
            displayName: "Install dependencies"
          - script: pnpm build
            displayName: "Build"
            env:
              VITE_API_URL: $(VITE_API_URL)
              VITE_ENVIRONMENT: $(VITE_ENVIRONMENT)
          - task: AzureStaticWebApp@0
            displayName: "Deploy to SWA"
            inputs:
              app_location: "build/client"
              skip_app_build: true
            env:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)

  - stage: DeployStaging
    displayName: "Deploy to Staging"
    condition: eq(variables['Build.SourceBranchName'], 'staging')
    variables:
      - group: KssFrontendDev
    jobs:
      - job: BuildAndDeploy
        displayName: "Build and Deploy"
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: "22.x"
            displayName: "Install Node.js"
          - script: |
              corepack enable
              pnpm install
            displayName: "Install dependencies"
          - script: pnpm build
            displayName: "Build"
            env:
              VITE_API_URL: $(VITE_API_URL)
              VITE_ENVIRONMENT: $(VITE_ENVIRONMENT)
          - task: AzureStaticWebApp@0
            displayName: "Deploy to SWA Staging"
            inputs:
              app_location: "build/client"
              skip_app_build: true
              deployment_environment: staging
            env:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
