trigger:
  branches:
    include:
    - dev
    - staging
    - main

variables:
- group: KssGlobal

parameters:
- name: environment
  displayName: Environment
  type: string
  default: KssFrontendDev
  values:
  - KssFrontendDev
  - KssFrontendProd

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: SecurityScan
  displayName: 'Security Scanning'
  condition: in(variables['Build.SourceBranchName'], 'dev')
  jobs:
  - job: SecretScan
    displayName: 'Secret and Credential Scan'
    steps:
    - checkout: self
      fetchDepth: "0"

    - script: |
        pip install truffleHog3
        trufflehog3 --format json --output truffleHog-report.json .
        if [ -s truffleHog-report.json ] && [ "$(cat truffleHog-report.json)" != "[]" ]; then
          echo "##[error]Secrets detected in repository!"
          cat truffleHog-report.json
          exit 1
        fi
      displayName: 'Run TruffleHog Secret Scan'

- stage: Build
  displayName: 'React Vite Build'
  dependsOn: SecurityScan
  condition: and(succeeded(), in(variables['Build.SourceBranchName'], 'dev', 'staging', 'main'))
  jobs:
  - job: ReactBuild
    displayName: 'React Vite Build'
    steps:
    - checkout: self
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
      displayName: 'Install Node.js'
    - script: npm install -g pnpm
      displayName: 'Install pnpm'
    - script: pnpm install
      displayName: 'Install Dependencies with pnpm'
    - script: pnpm run build
      displayName: 'Build React App with pnpm'
    - publish: $(System.DefaultWorkingDirectory)/build
      artifact: build
      displayName: 'Publish build artifacts'

- stage: DeploySWA
  displayName: 'Deploy to Static Web App'
  dependsOn: Build
  condition: in(variables['Build.SourceBranchName'], 'staging', 'main')
  variables:
  - group: ${{ parameters.environment }}

  jobs:
  - job: DeployStaticWebApp
    displayName: 'Deploy to Azure Static Web App'
    steps:
      - download: current
        artifact: build
      - checkout: self
      - task: AzureStaticWebApp@0
        inputs:
          app_location: $(System.DefaultWorkingDirectory)/build
          output_location: ''
          skip_app_build: true
          skip_api_build: true
          azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN)
