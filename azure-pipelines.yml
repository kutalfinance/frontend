trigger:
  branches:
    include:
      - dev
      - staging
      - main

variables:
  - group: KssFrontend
  - name: buildFolder
    value: build

pool:
  vmImage: ubuntu-latest

stages:
- stage: SecurityScan
  displayName: 'Security Scanning'
  condition: succeeded()
  jobs:
  - job: SecretScan
    displayName: 'Secret and Credential Scan'
    steps:
    - checkout: self
      fetchDepth: '0'
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'
      displayName: 'Install Python'
    - script: |
        pip install truffleHog3
        trufflehog3 --format json --output truffleHog-report.json .
        if [ -s truffleHog-report.json ] && [ "$(cat truffleHog-report.json)" != "[]" ]; then
          echo "##[error]Secrets detected in repository!"
          cat truffleHog-report.json
          exit 1
        fi
      displayName: 'Run TruffleHog Secret Scan'

- stage: BuildAndDeploy
  displayName: 'Build And Deploy'
  dependsOn: SecurityScan
  condition: succeeded()
  jobs:
  - job: ReactBuild
    displayName: 'React Vite Build'
    steps:
    - checkout: self
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
      displayName: 'Install Node.js'
    - script: |
        corepack enable
        pnpm install --frozen-lockfile
        pnpm run build
      displayName: 'Build App'

    - script: |
        npm install -g @azure/static-web-apps-cli
        if [ "$(Build.SourceBranchName)" = "main" ]; then
          ENV="production"
        elif [ "$(Build.SourceBranchName)" = "staging" ]; then
          ENV="staging"
        fi
        swa deploy $(buildFolder) --deployment-token $(SWA_DEPLOYMENT_TOKEN) --env $ENV
      displayName: 'Deploy to Azure Static Web App'
      condition: ne(variables['Build.SourceBranchName'], 'dev')
