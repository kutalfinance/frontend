trigger:
  branches:
    include:
    - dev
    - staging
    - main

variables:
- group: KssGlobal

parameters:
- name: environment
  displayName: Environment
  type: string
  default: KssFrontendDev
  values:
  - KssFrontendDev
  - KssFrontendProd

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: SecurityScan
  displayName: 'Security Scanning'
  condition: in(variables['Build.SourceBranchName'], 'dev')
  jobs:
  - job: SecretScan
    displayName: 'Secret and Credential Scan'
    steps:
    - checkout: self
      fetchDepth: "0"

    - script: |
        pip install truffleHog3
        trufflehog3 --format json --output truffleHog-report.json .
        if [ -s truffleHog-report.json ] && [ "$(cat truffleHog-report.json)" != "[]" ]; then
          echo "##[error]Secrets detected in repository!"
          cat truffleHog-report.json
          exit 1
        fi
      displayName: 'Run TruffleHog Secret Scan'

- stage: Build
  displayName: 'React Vite Build'
  dependsOn: SecurityScan
  condition: and(succeeded(), in(variables['Build.SourceBranchName'],'dev'))
  jobs:
  - job: ReactBuild
    displayName: 'React Vite Build'
    steps:
    - checkout: self
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
      displayName: 'Install Node.js'
    - script: |
        corepack enable
        pnpm install --frozen-lockfile
        pnpm run build
      displayName: "Build App"
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'build'
        ArtifactName: 'vite-build'
        publishLocation: 'Container'

- stage: Deploy
  displayName: "Deploy to SWA"
  condition: or(eq(variables['Build.SourceBranchName'], 'staging'), eq(variables['Build.SourceBranchName'], 'main'))
  dependsOn: Build
  variables:
  - group: ${{ parameters.environment }}
  jobs:
    - job: DeployJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - download: current
          artifact: vite-build
        - script: |
            npm install -g @azure/static-web-apps-cli
            swa deploy $(Pipeline.Workspace)/vite-build --deployment-token $SWA_DEPLOYMENT_TOKEN
          env:
            SWA_DEPLOYMENT_TOKEN: $(SWA_DEPLOYMENT_TOKEN)
