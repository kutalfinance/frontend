trigger:
  branches:
    include:
    - dev
    - staging
    - main

variables:
- group: KssGlobal

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: ScanAndBuild
  displayName: 'Scan and Build app'
  condition: eq(variables['Build.SourceBranchName'], 'dev')
  jobs:
  - job: SecretScan
    displayName: 'Secret and Credential Scan'
    steps:
    - checkout: self
      fetchDepth: '0'
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'
      displayName: 'Install Python'
    - script: |
        pip install truffleHog3
        trufflehog3 --format json --output truffleHog-report.json .
        if [ -s truffleHog-report.json ] && [ "$(cat truffleHog-report.json)" != "[]" ]; then
          echo "##[error]Secrets detected in repository!"
          cat truffleHog-report.json
          exit 1
        fi
      displayName: 'Run TruffleHog Secret Scan'
  - job: ReactBuild
    displayName: 'React Vite Build'
    steps:
    - checkout: self
    - task: NodeTool@0
      inputs:
        versionSpec: '24.x'
      displayName: 'Install Node.js'
    - script: |
        corepack enable
        pnpm install --frozen-lockfile
        pnpm run build
      displayName: 'Build App'

- stage: DockerBuildPush
  displayName: 'Docker Build and Push'
  dependsOn: ScanAndBuild
  condition: in(variables['Build.SourceBranchName'], 'staging', 'main')
  variables:
    - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - group: KssFrontendProd
    - ${{ if ne(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - group: KssFrontendDev
    - name: CONTAINER_IMAGE_NAME
      value: "$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(Build.SourceVersion)"
  jobs:
  - job: BuildPushDockerImage
    displayName: 'Build and Push Docker Image'
    steps:
    - checkout: self
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'KssArmConnection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(ACR_NAME)
          docker build \
            --build-arg VITE_API_URL=$(VITE_API_URL) VITE_ENVIRONMENT=$(VITE_ENVIRONMENT) \
            -t $CONTAINER_IMAGE_NAME .
          docker push $CONTAINER_IMAGE_NAME
      displayName: 'Build and Push to ACR'

- stage: UpdateContainer
  displayName: 'Update Container'
  dependsOn: DockerBuildPush
  condition: in(variables['Build.SourceBranchName'], 'staging', 'main')
  variables:
    - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - group: KssFrontendProd
    - ${{ if ne(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - group: KssFrontendDev
    - name: CONTAINER_IMAGE_NAME
      value: "$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(Build.SourceVersion)"

  jobs:
  - job: UpdateContainerApp
    displayName: 'Update Container App'
    steps:
    - checkout: none
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'KssArmConnection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Updating Container App: $(CONTAINER_APP_NAME)"
          echo "Resource Group: $(RESOURCE_GROUP)"
          echo "New Image: $(CONTAINER_IMAGE_NAME)"

          # Update the container app with new image
          az containerapp update \
            --name $(CONTAINER_APP_NAME) \
            --resource-group $(RESOURCE_GROUP) \
            --image $(CONTAINER_IMAGE_NAME)

          echo "Container App updated successfully!"

          # Show the current revision status
          az containerapp revision list \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query '[].{Name:name,CreatedTime:properties.createdTime,Active:properties.active,Image:properties.template.containers[0].image}' \
            --output table

      displayName: 'Update Container App Image'
